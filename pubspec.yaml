name: e_commerce
description: A new Flutter project.
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.0.5 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  fluttertoast: ^8.2.14
  share_plus: ^12.0.2
  lottie: ^3.3.2
  flutter_cached_pdfview: ^0.4.2
  provider: ^6.0.5
  flutter_secure_storage: ^9.2.4
  dio: ^5.3.0
  badges: ^3.1.2
  url_launcher: ^6.3.2
  intl: ^0.20.2
  animated_text_kit: ^4.3.0
  speech_to_text: ^7.3.0
  font_awesome_flutter: ^10.12.0
  image_picker: ^1.2.1
  csv: ^6.0.0
  file_picker: ^10.3.7
  permission_handler: ^12.0.1
  file_saver: ^0.3.1
  open_filex: ^4.7.0
  shared_preferences: ^2.5.4
  razorpay_flutter: ^1.4.0
  free_map: ^2.1.0
  latlong2: ^0.9.1
  geolocator: ^9.0.2
  geocoding: ^2.0.5
  http: ^1.6.0
  flutter_staggered_grid_view: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash:

flutter_native_splash:
  image: Assets/splash2.png
  color: "#FFE141"
  ios: false
  web: false
  android_12:
    image: Assets/splash2.png
    icon_background_color: "#FFE141"

flutter:
  uses-material-design: true
  assets:
    - Assets/
    - Assets/cimgs/
    - Assets/Categories/
    - Assets/SubCategories/
    - Assets/Products/
    - Assets/Images/

  fonts:
    - family: Catamaran
      fonts:
        - asset: Assets/Fonts/Catamaran-Regular.ttf
        - asset: Assets/Fonts/Catamaran-Bold.ttf
          weight: 700
        - asset: Assets/Fonts/Catamaran-ExtraBold.ttf
          weight: 800
        - asset: Assets/Fonts/Catamaran-Light.ttf
          weight: 300
        - asset: Assets/Fonts/Catamaran-Medium.ttf
          weight: 500
        - asset: Assets/Fonts/Catamaran-Thin.ttf
          weight: 100
        - asset: Assets/Fonts/Catamaran-SemiBold.ttf
          weight: 600
